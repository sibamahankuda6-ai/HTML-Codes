<html>
<head>
<title>Iframe target</title></head>
<body>
<div style="background-color:navy;color:cyan;">
<h1>iframe target for a link<h1></div>
<iframe src="product info.html" name="iframe product info" height="400px" width="100%" title="iframe example"></iframe>
<p><a href="marquee2.html" target="iframe marquee2">W3school.com</a></p>
<div style="background-color:lightgray;color:blue;">
<p>when the target attribute of a link matches the name of an iframe,the link will open in the iframe</p></div>
</body>
</html>
