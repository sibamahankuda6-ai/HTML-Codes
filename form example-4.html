<html>

<head>
    <title>form application</title>
</head>

<body>
    <h1>
        <font face="times new roman" color="black">Application form
    </h1>
    </font>
    <form>
        <fieldset>
            <legend align="center">Hello student</legend>
            <label for="first name">First name:</label><br><input type="text"><br><br>
            Last name:<input type="text"><br><br>
            Date of birth:<br><input type="date"><br><br>
            Age:<br><input type="number"><br><br>
            Gender:<select>
                <option>Male</option>
                <option>Female</option>
                <option>other</option>
            </select><br><br>
            Email address:<input type="text"><br><br>
            Position Available:
            <input type="radio">Junior Developer
            <input type="radio">Mid-level Developer
            <input type="radio">Senior Developer<br><br>
            Programming Languages:<input type="checkbox">Java<input type="checkbox">JavaScript<input
                type="checkbox">Python<br><br>
            Password:<input type="password"><br><br>
            Confirm Passward:<input type="password"><br><br>
            <input type="submit">&nbsp;&nbsp;<input type="submit" value="reset">
        </fieldset>
    </form>
</body>

</html>
