<html>
<head>
<title>list</title></head>
<body  bgcolor=corn text=lightyellow>
<div style="background-color:green;color:yellow";>
<h1>the css list style properties</h1></div>
<div style="background-color:yellow;color:green";>
<h2>image list-item maker inside</h2></div>
<table border=1 bordercolor="lightyellow" width=100%>
<tr><td><ol type="i" start="1">
<li>first</li></ol></tr></table>
<table border=1 bordercolor="lightyellow" width=100%>
<tr><td><ol type="i" start="2">
<li>second</li></ol></tr></table>
<table border=1 bordercolor="lightyellow" width=100%>
<tr><td><ol type="i" start="3">
<li>third</li></ol></tr></table>
<table border=1 bordercolor="lightyellow" width=100%>
<tr><td><ol type="i" start="4">
<li>fourth</li></ol></tr></table>
<div style="background-color:yellow;color:green";>
<h2>square list-item maker inside</h2></div>
<table border=1 bordercolor="lightyellow" width=100%>
<tr bordercolor="white"><td>
<ul type="square"><li>tin of tomatoes</ul></li></table></tr>
<table border=1 bordercolor="lightyellow" width=100%>
<tr><td>
<ul type="square"><li>Bacon</ul></li></table></tr>
<table border=1 bordercolor="lightyellow" width=100%>
<tr><td>
<ul type="square"><li>Loaf of bread</ul></li></table></tr>
<table border=1 bordercolor="lightyellow" width=100%>
<tr><td>
<ul type="square"><li>mushroom</ul></li></table></tr>
</body>
</html>
