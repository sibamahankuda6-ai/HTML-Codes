<html>
<head>
<title>opt group form</title></head>
<body bgcolor="lightblue">
<div style="background-color:lightskyblue;color:white;">
<h1 align="center">select with in option and option group tag in html</h1></div><br><br>
<form>
 <font color="blue" size=4><b>select your dell and lanovo laptop name:<select>
<optgroup label="dell laptop">
<option>Dell laptop-L2</option>
<option>Dell laptop-L4</option>
<option>Dell laptop-L6</option></optgroup>
<optgroup label="Lenovo laptop">
<option>Lenovo laptop</option>
<option>Dell laptop-L1</option>
</optgroup></select><br><br><br>
 <font color="blue" size=4><b>select your Hp and Lg laptop name:
<select>
<optgroup label="Hp laptop">
<option>Hp laptop-2</option>
<option>Hp laptop-6</option>
<option>Hp laptop-8</option></optgroup>
<optgroup label="Lg laptop">
<option>Lg laptop-1</option></optgroup>
</select>
</font>
</form>
</body>
</html>
