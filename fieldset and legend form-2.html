<html>
<head>
<title>fieldset and lehend-2</title></head>
<body bgcolor="lightblue" text="navy">
<div style="background-color:navy;color:lightblue;">
<h1>the fieldset and legend element</h1></div>
<form>
<fieldset><legend><b>Personal info:</legend></b>
First name:<input type="text" name="fname"><br><br>
Last name:<input type="text" name="lname"><br><br>
Email: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<input type="email" name="email"><br><br>
Birthday:<input type="date" name="birthday"><br><br>
<center><div style="background-color:navy;color:lightblue;"><input type="submit" value="submit">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
<input type="reset" value="reset"></center></div>
</fieldset>
</form>
</body>
</html>
