<html>
<head>
<title>radio button-2</title></head>
<body bgcolor="cream">
<div style="background-color:green;color:white;">
<h1 align="center">display radio buttons</h1></div>
<form>
<div style="background-color:green;color:white;">
<p>please select your favorite web language:</p></div>
<input type="radio" name="fav-language" value="html">html
<input type="radio" name="fav-language" value="css">css
<input type="radio" name="fav-language" value="Java script">java script
<div style="background-color:green;color:white;">
<p>please select your age:</p></div>
<input type="radio" name="age" value="30">0-30<br>
<input type="radio" name="age" value="60">31-60<br>
<input type="radio" name="age" value="100">61-100<br>
<center><input type="submit" value="submit"></center>
</form>
</body>
</html>
